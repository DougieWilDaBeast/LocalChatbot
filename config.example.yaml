# Copy this file to config.yaml and customize values for your environment.
# Example:
#   cp config.example.yaml config.yaml

# =============================================================================
# NUC Offline Voice Assistant — Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Assistant Identity
# -----------------------------------------------------------------------------
assistant:
  name: "YourAssistantName"             # CHANGE THIS: what the assistant calls itself
  system_prompt: |
    You are a friendly, patient voice assistant called YourAssistantName.
    You are running locally on a small computer in the home.
    You have no internet connection and do not need one.
    Keep your responses conversational and concise — you are being spoken to
    and your reply will be read aloud, so avoid bullet points, markdown,
    long lists, or any formatting. Just talk naturally.
    If you do not know something, say so simply.
    The person you are speaking with is [YOUR_NAME], based in [YOUR_LOCATION].
    They are [SHORT_PROFILE, e.g. "retired and interested in local history and weather"].

# -----------------------------------------------------------------------------
# LLM Model
# -----------------------------------------------------------------------------
model:
  name: "gemma3:4b"                     # ollama model name
  # Alternatives:
  # name: "gemma4:e4b"                  # Newer, more capable, needs ~6GB RAM
  # name: "gemma3:1b"                   # Faster, lighter, less capable
  temperature: 0.7
  max_tokens: 300                       # Keep responses short for voice output
  context_window: 4096                  # Reduce if you hit memory limits

# -----------------------------------------------------------------------------
# Speech-to-Text (faster-whisper)
# -----------------------------------------------------------------------------
stt:
  model: "small"                        # tiny | base | small | medium
  language: "en"
  device: "cpu"                         # cpu | cuda | auto
  compute_type: "int8"                  # int8 for CPU efficiency
  # For Intel Iris Xe acceleration via OpenVINO, see docs/OPENVINO.md

# -----------------------------------------------------------------------------
# Wake Word (openWakeWord)
# -----------------------------------------------------------------------------
wake_word:
  enabled: true
  model: "hey_jarvis"                   # Built-in models: hey_jarvis, alexa, hey_mycroft
  threshold: 0.5                        # 0.0–1.0, lower = more sensitive
  # To use a custom wake word, see openWakeWord documentation

# -----------------------------------------------------------------------------
# Text-to-Speech (Piper)
# -----------------------------------------------------------------------------
tts:
  binary: "/usr/local/bin/piper"
  model: "models/piper/en_GB-alba-medium.onnx"
  config: "models/piper/en_GB-alba-medium.onnx.json"
  # Alternative voices — download from HuggingFace rhasspy/piper-voices:
  # en_US-lessac-medium    (American, clear)
  # en_GB-alan-medium      (British male)
  # en_IE-                 (Irish — check for availability)

# -----------------------------------------------------------------------------
# Audio Hardware
# -----------------------------------------------------------------------------
audio:
  input_device: null                    # null = system default. Set to device index from setup.sh
  output_device: null                   # null = system default
  sample_rate: 16000
  channels: 1
  record_seconds: 8                     # Max recording length after wake word
  silence_threshold: 500                # Stop recording after this many ms of silence
  chunk_size: 1280

# -----------------------------------------------------------------------------
# Behaviour
# -----------------------------------------------------------------------------
behaviour:
  startup_sound: true                   # Play a tone on boot to signal ready state
  listening_indicator: true             # Print to stdout when listening
  conversation_memory: 6                # Number of previous exchanges to keep in context (0 = none)
  debug_mode: false                     # Set to true to print transcriptions and responses to stdout
